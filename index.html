<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Master</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header class="header">
        <div class="logo">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
          <span class="logo-text">Quiz Master</span>
        </div>
      </header>

      <main class="main-content">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
          <div class="card start-card">
            <div class="icon-container">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4A90E2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
            <h1>Quiz Master</h1>
            <p>Test your knowledge with our interactive quiz. Challenge yourself and see how much you really know!</p>
            <button id="start-btn" class="btn btn-primary">
              Start Quiz
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
          </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
          <div class="card quiz-card">
            <div class="progress-container">
              <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="quiz-header">
              <span id="question-counter" class="counter">Question 1 of 10</span>
              <span id="current-score" class="score-display">Score: 0</span>
            </div>
            <h2 id="question-text">Question text goes here?</h2>
            <div id="options-container" class="options-list">
              <!-- Options will be injected here -->
            </div>
            <div class="quiz-footer">
              <button id="next-btn" class="btn btn-primary" disabled>
                Check Answer
              </button>
            </div>
          </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
          <div class="card result-card">
            <div class="trophy-container">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#EAB308" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            </div>
            <h2>Quiz Completed!</h2>
            <p id="result-message">Excellent! You're a Master!</p>
            <div class="final-score-box">
              <span class="score-label">Your Score</span>
              <div class="score-value">
                <span id="final-score">7</span><span class="total">/10</span>
              </div>
            </div>
            <button id="restart-btn" class="btn btn-dark">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
              Restart Quiz
            </button>
          </div>
        </div>
      </main>

      <!-- Background Elements -->
      <div class="bg-decoration top-left"></div>
      <div class="bg-decoration bottom-right"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
